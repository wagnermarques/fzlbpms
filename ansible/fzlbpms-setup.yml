---
# Installs Docker Engine + the Compose v2 plugin needed to run the fzlbpms
# stack (bin/run-stack.sh and docker-compose-up.sh both call `docker compose`,
# not the standalone docker-compose v1 binary).
#
# Portable across: Debian 12+, Ubuntu 22.04+, Fedora, Alpine (edge/3.19+).
# Debian/Ubuntu/Fedora get Docker's official upstream repo (distro repos ship
# no docker-ce package); Alpine already carries Docker in its own repos.
#
# Also switches the storage driver to Docker's native "btrfs" one whenever
# /var/lib/docker sits on a btrfs filesystem (Fedora Workstation's default
# root layout) — the containerd-snapshotter Docker defaults to otherwise
# fails mid-build on btrfs with "failed to add snapshot ... to lease: EOF".
#
#   ansible-playbook fzlbpms-setup.yml            # uses ./inventory.ini
#   ansible-playbook fzlbpms-setup.yml -K          # ask for sudo password
#
# After the first run, log out/in (or `newgrp docker`) so group membership
# takes effect, then:
#
#   cd .. && ./bin/run-stack.sh basic
#
- name: Install Docker Engine + Compose plugin for the fzlbpms stack
  hosts: docker_hosts
  become: false # only package/service/group management escalates
  vars:
    docker_login_user: "{{ ansible_env.SUDO_USER | default(ansible_env.USER) }}"

    docker_packages:
      Debian: # covers Debian and Ubuntu (same ansible_os_family)
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
      RedHat: # Fedora
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
      Alpine:
        - docker
        - docker-cli-compose

  pre_tasks:
    - name: Ensure the distribution is one we support
      ansible.builtin.assert:
        that: ansible_facts.os_family in docker_packages
        fail_msg: >-
          Unsupported OS family '{{ ansible_facts.os_family }}'.
          This playbook supports Debian, Ubuntu, Fedora and Alpine.

    - name: Ensure this playbook only targets Fedora within the RedHat family
      ansible.builtin.assert:
        that: ansible_facts.distribution == "Fedora"
        fail_msg: >-
          '{{ ansible_facts.distribution }}' uses a different Docker repo path
          than Fedora (see download.docker.com/linux/) — add it explicitly
          before running this playbook on RHEL/CentOS/Rocky.
      when: ansible_facts.os_family == "RedHat"

  tasks:
    # ------------------------------------------------------------------
    # Debian / Ubuntu: add Docker's official apt repo, then install
    # ------------------------------------------------------------------
    - name: Install apt prerequisites for adding the Docker repo
      become: true
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true
      when: ansible_facts.os_family == "Debian"

    - name: Create the apt keyrings directory
      become: true
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      when: ansible_facts.os_family == "Debian"

    - name: Download Docker's apt GPG key
      become: true
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      when: ansible_facts.os_family == "Debian"

    - name: Add the Docker apt repo
      become: true
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_facts.architecture | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}
          {{ ansible_facts.distribution_release }} stable
        filename: docker
        state: present
        update_cache: true
      when: ansible_facts.os_family == "Debian"

    - name: Install Docker (apt)
      become: true
      ansible.builtin.apt:
        name: "{{ docker_packages.Debian }}"
        state: present
      when: ansible_facts.os_family == "Debian"

    # ------------------------------------------------------------------
    # Fedora: add Docker's official dnf repo, then install
    # ------------------------------------------------------------------
    - name: Install dnf-plugins-core (provides dnf config-manager)
      become: true
      ansible.builtin.dnf:
        name: dnf-plugins-core
        state: present
      when: ansible_facts.os_family == "RedHat"

    - name: Add the Docker dnf repo
      become: true
      ansible.builtin.yum_repository:
        name: docker-ce-stable
        description: Docker CE Stable - $basearch
        baseurl: https://download.docker.com/linux/fedora/$releasever/$basearch/stable
        gpgcheck: true
        gpgkey: https://download.docker.com/linux/fedora/gpg
        enabled: true
      when: ansible_facts.os_family == "RedHat"

    - name: Install Docker (dnf)
      become: true
      ansible.builtin.dnf:
        name: "{{ docker_packages.RedHat }}"
        state: present
      when: ansible_facts.os_family == "RedHat"

    # ------------------------------------------------------------------
    # Alpine: Docker ships in Alpine's own repos, no extra repo needed
    # ------------------------------------------------------------------
    - name: Install Docker (apk)
      become: true
      community.general.apk:
        name: "{{ docker_packages.Alpine }}"
        state: present
        update_cache: true
      when: ansible_facts.os_family == "Alpine"

    # ------------------------------------------------------------------
    # Service + user group (all distros)
    # ------------------------------------------------------------------
    - name: Enable and start the docker service (systemd)
      become: true
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      when: ansible_facts.os_family in ["Debian", "RedHat"]

    - name: Enable and start the docker service (OpenRC)
      become: true
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started
      when: ansible_facts.os_family == "Alpine"

    - name: Add {{ docker_login_user }} to the docker group (run docker without sudo)
      become: true
      ansible.builtin.user:
        name: "{{ docker_login_user }}"
        groups: docker
        append: true

    # ------------------------------------------------------------------
    # btrfs data-root: Docker's default containerd-snapshotter (overlayfs,
    # default since Docker 27+) is unreliable over a btrfs backing
    # filesystem — Fedora Workstation's default root layout — and fails
    # mid `docker compose build` with "failed to add snapshot ... to lease:
    # error reading from server: EOF" under concurrent builds. Docker's own
    # "btrfs" graph driver is purpose-built for this and bypasses the
    # containerd snapshotter entirely, so switch to it whenever
    # /var/lib/docker sits on btrfs.
    # ------------------------------------------------------------------
    - name: Detect the filesystem backing the docker data-root
      ansible.builtin.command: stat -f -c %T /var/lib/docker
      register: docker_root_fstype
      changed_when: false
      when: ansible_facts.os_family in ["Debian", "RedHat"]

    - name: Ensure /etc/docker exists
      become: true
      ansible.builtin.file:
        path: /etc/docker
        state: directory
        mode: "0755"
      when:
        - ansible_facts.os_family in ["Debian", "RedHat"]
        - docker_root_fstype.stdout | default('') == "btrfs"

    - name: Use Docker's native btrfs storage driver on a btrfs data-root
      become: true
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "storage-driver": "btrfs",
            "features": {
              "containerd-snapshotter": false
            }
          }
      register: docker_daemon_json
      when:
        - ansible_facts.os_family in ["Debian", "RedHat"]
        - docker_root_fstype.stdout | default('') == "btrfs"

    - name: Restart docker to pick up the storage-driver change
      become: true
      ansible.builtin.systemd:
        name: docker
        state: restarted
      when: docker_daemon_json is changed

    # ------------------------------------------------------------------
    # Verification
    # ------------------------------------------------------------------
    - name: Collect tool versions
      ansible.builtin.command: "{{ item }}"
      loop:
        - docker --version
        - docker compose version
      register: versions
      changed_when: false
      become: true # proves the packages/daemon work, independent of group membership

    - name: Show installed versions
      ansible.builtin.debug:
        msg: "{{ versions.results | map(attribute='stdout') | list }}"

    # `docker` module tasks above and this ansible-playbook process itself are
    # children of the terminal that was already open before the user was
    # added to the docker group, so they carry the SAME stale group list a
    # plain `docker ps` in that terminal would hit. `sg <group> -c ...`
    # re-reads /etc/group and spawns a process with the new group live,
    # without needing a fresh login — so it actually proves the grant works
    # instead of masking the question behind sudo.
    - name: Verify {{ docker_login_user }} can already run docker via the docker group
      ansible.builtin.command: sg docker -c "docker info"
      become: false
      register: sg_docker_check
      changed_when: false
      failed_when: false
      when: ansible_facts.os_family != "Alpine" # sg may be absent there

    - name: Report whether the docker group grant is live
      ansible.builtin.debug:
        msg: >-
          {{ "OK: " ~ docker_login_user ~ " can run docker via the docker group (verified with sg)."
             if (sg_docker_check.rc | default(1)) == 0
             else "The docker group was granted in /etc/group, but sg couldn't use it yet — see the reminder below." }}
      when: ansible_facts.os_family != "Alpine"

    - name: Remind about group membership
      ansible.builtin.debug:
        msg: >-
          Docker is installed and the daemon is running. IMPORTANT: the
          terminal you ran this playbook from still has your OLD group list
          (it existed before {{ docker_login_user }} was added to `docker`),
          so plain `docker`/`docker compose` commands will keep failing with
          "permission denied" in THAT terminal until you either open a brand
          new terminal window/tab, or run `newgrp docker` in it. Then:
          ./bin/run-stack.sh basic
