---
# Installs Docker Engine + the Compose v2 plugin needed to run the fzlbpms
# stack (bin/run-stack.sh and docker-compose-up.sh both call `docker compose`,
# not the standalone docker-compose v1 binary).
#
# Portable across: Debian 12+, Ubuntu 22.04+, Fedora, Alpine (edge/3.19+).
# Debian/Ubuntu/Fedora get Docker's official upstream repo (distro repos ship
# no docker-ce package); Alpine already carries Docker in its own repos.
#
#   ansible-playbook fzlbpms-setup.yml            # uses ./inventory.ini
#   ansible-playbook fzlbpms-setup.yml -K          # ask for sudo password
#
# After the first run, log out/in (or `newgrp docker`) so group membership
# takes effect, then:
#
#   cd .. && ./bin/run-stack.sh basic
#
- name: Install Docker Engine + Compose plugin for the fzlbpms stack
  hosts: docker_hosts
  become: false # only package/service/group management escalates
  vars:
    docker_login_user: "{{ ansible_env.SUDO_USER | default(ansible_env.USER) }}"

    docker_packages:
      Debian: # covers Debian and Ubuntu (same ansible_os_family)
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
      RedHat: # Fedora
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
      Alpine:
        - docker
        - docker-cli-compose

  pre_tasks:
    - name: Ensure the distribution is one we support
      ansible.builtin.assert:
        that: ansible_facts.os_family in docker_packages
        fail_msg: >-
          Unsupported OS family '{{ ansible_facts.os_family }}'.
          This playbook supports Debian, Ubuntu, Fedora and Alpine.

    - name: Ensure this playbook only targets Fedora within the RedHat family
      ansible.builtin.assert:
        that: ansible_facts.distribution == "Fedora"
        fail_msg: >-
          '{{ ansible_facts.distribution }}' uses a different Docker repo path
          than Fedora (see download.docker.com/linux/) — add it explicitly
          before running this playbook on RHEL/CentOS/Rocky.
      when: ansible_facts.os_family == "RedHat"

  tasks:
    # ------------------------------------------------------------------
    # Debian / Ubuntu: add Docker's official apt repo, then install
    # ------------------------------------------------------------------
    - name: Install apt prerequisites for adding the Docker repo
      become: true
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true
      when: ansible_facts.os_family == "Debian"

    - name: Create the apt keyrings directory
      become: true
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      when: ansible_facts.os_family == "Debian"

    - name: Download Docker's apt GPG key
      become: true
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      when: ansible_facts.os_family == "Debian"

    - name: Add the Docker apt repo
      become: true
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_facts.architecture | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}
          {{ ansible_facts.distribution_release }} stable
        filename: docker
        state: present
        update_cache: true
      when: ansible_facts.os_family == "Debian"

    - name: Install Docker (apt)
      become: true
      ansible.builtin.apt:
        name: "{{ docker_packages.Debian }}"
        state: present
      when: ansible_facts.os_family == "Debian"

    # ------------------------------------------------------------------
    # Fedora: add Docker's official dnf repo, then install
    # ------------------------------------------------------------------
    - name: Install dnf-plugins-core (provides dnf config-manager)
      become: true
      ansible.builtin.dnf:
        name: dnf-plugins-core
        state: present
      when: ansible_facts.os_family == "RedHat"

    - name: Add the Docker dnf repo
      become: true
      ansible.builtin.yum_repository:
        name: docker-ce-stable
        description: Docker CE Stable - $basearch
        baseurl: https://download.docker.com/linux/fedora/$releasever/$basearch/stable
        gpgcheck: true
        gpgkey: https://download.docker.com/linux/fedora/gpg
        enabled: true
      when: ansible_facts.os_family == "RedHat"

    - name: Install Docker (dnf)
      become: true
      ansible.builtin.dnf:
        name: "{{ docker_packages.RedHat }}"
        state: present
      when: ansible_facts.os_family == "RedHat"

    # ------------------------------------------------------------------
    # Alpine: Docker ships in Alpine's own repos, no extra repo needed
    # ------------------------------------------------------------------
    - name: Install Docker (apk)
      become: true
      community.general.apk:
        name: "{{ docker_packages.Alpine }}"
        state: present
        update_cache: true
      when: ansible_facts.os_family == "Alpine"

    # ------------------------------------------------------------------
    # Service + user group (all distros)
    # ------------------------------------------------------------------
    - name: Enable and start the docker service (systemd)
      become: true
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      when: ansible_facts.os_family in ["Debian", "RedHat"]

    - name: Enable and start the docker service (OpenRC)
      become: true
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started
      when: ansible_facts.os_family == "Alpine"

    - name: Add {{ docker_login_user }} to the docker group (run docker without sudo)
      become: true
      ansible.builtin.user:
        name: "{{ docker_login_user }}"
        groups: docker
        append: true

    # ------------------------------------------------------------------
    # Verification
    # ------------------------------------------------------------------
    - name: Collect tool versions
      ansible.builtin.command: "{{ item }}"
      loop:
        - docker --version
        - docker compose version
      register: versions
      changed_when: false
      become: true # group membership hasn't taken effect in this SSH session yet

    - name: Show installed versions
      ansible.builtin.debug:
        msg: "{{ versions.results | map(attribute='stdout') | list }}"

    - name: Remind about group membership
      ansible.builtin.debug:
        msg: >-
          Docker is installed. Log out and back in (or run `newgrp docker`)
          so {{ docker_login_user }} can run `docker`/`docker compose`
          without sudo, then: ./bin/run-stack.sh basic
