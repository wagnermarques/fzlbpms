# Hosts that should get the Rust/Tauri toolchain.
# The playbook targets the "tauri_dev" group.

[tauri_dev]
# This machine (default):
localhost ansible_connection=local

# Remote examples — uncomment and adjust:
# debian-vm  ansible_host=192.168.122.10 ansible_user=wgn
# alpine-box ansible_host=192.168.122.11 ansible_user=wgn

# Hosts that should get the containerized-command aliases
# (commands-aliases.yml — mvn inside an ephemeral maven container).
[command_aliases]
localhost ansible_connection=local

# Hosts that should get Docker Engine + the Compose plugin
# (fzlbpms-setup.yml — required by bin/run-stack.sh).
[docker_hosts]
localhost ansible_connection=local
