server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html index.htm;

    # Docker's embedded DNS; with proxy_pass in a variable, upstream names are
    # resolved per-request, so nginx starts even when these containers are down.
    resolver 127.0.0.11 valid=30s;

    # --- Reverse-proxy gateway routes (formerly on port 8899) ---

    # Karaf web console (strip the /karafconsole prefix)
    location /karafconsole/ {
        rewrite ^/karafconsole/(.*)$ /$1 break;
        set $karaf_upstream http://fzl-karaf-camel-integration:8181;
        proxy_pass $karaf_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
    }

    # Redirect bare /flowable-ui to /flowable-ui/ so the prefix block below fires
    location = /flowable-ui {
        return 301 /flowable-ui/;
    }

    # Flowable UI (/flowable-ui/... passed through unchanged — Spring Boot keeps its own context path)
    location /flowable-ui/ {
        set $flowable_upstream http://flowable-ui:8080;
        proxy_pass $flowable_upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  80;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Keycloak (/auth/... is passed through unchanged)
    location /auth/ {
        set $keycloak_upstream http://fzl-keycloak:8080;
        proxy_pass $keycloak_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;

        # Essential for Keycloak to work correctly behind a proxy
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # --- Moodle Configuration (Requires /public) ---
    location /moodle {
        alias /var/www/html/moodle/public;
        try_files $uri $uri/ /moodle/r.php$is_args$args;
    }

    location ~ ^/moodle(.+\.php)(/.*)?$ {
        alias /var/www/html/moodle/public$1;
        fastcgi_split_path_info ^(/moodle.+\.php)(/.*)$;
        set $path_info $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_pass fzl-php8.3-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_read_timeout 300;
    }

    # --- fzlbpmsadmin-web (Angular SPA, static build) ---
    # Bare /fzlbpmsadmin (no trailing slash) doesn't match the prefix
    # location below, so it falls through to the generic "location /" PHP
    # catch-all instead of the SPA — redirect it first.
    location = /fzlbpmsadmin {
        return 301 /fzlbpmsadmin/;
    }

    location /fzlbpmsadmin/ {
        alias /var/www/fzlbpmsadmin/;
        try_files $uri $uri/ /fzlbpmsadmin/index.html;
    }

    # --- 1. Dedicated Block for the /ava211/ Application ---
    # --- vai servir para varios instancias de moodles
    location /ava211/ {
        # Define the root of the Moodle app within the main root
        # This is CRUCIAL: try_files must point to the subdirectory's index.php as fallback.
        try_files $uri $uri/ /ava211/index.php?$query_string;
    }


    # To other root-level apps or files, we need a generic root block too
    location / {
        # This catches anything that didn't match any more specific dirs above like /ava211, and uses the default index.php
        try_files $uri $uri/ /index.php?$query_string; 
    }

    # --- 3. Robust PHP-FPM Processing Block ---
    # This regex is crucial for handling Moodle's path-info URLs (e.g., /ava211/lib/javascript.php/...)
    location ~ [^/]\.php(/|$) {
        # Include standard parameters
        include fastcgi_params;
        
        # Split the path to isolate the script name from the path info (Moodle needs this)
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # Define the SCRIPT_FILENAME and PATH_INFO for PHP
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Pass to the PHP-FPM container
        fastcgi_pass fzl-php8.3-fpm:9000;
        fastcgi_index index.php;
        
        # Standard settings
        fastcgi_param HTTP_PROXY ""; # Prevent proxying loops
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }


    # Deny access to hidden files
    location ~ /\.ht {
        deny all;
    }
}